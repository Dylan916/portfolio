<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meta - Code Analysis</title>
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="../global.js"></script>
  </head>
  <body>
    <h1>Meta: Codebase Analysis</h1>
    <p>Stats and visualizations about the code in this project.</p>

    <div style="display: flex; flex: 1; align-items: baseline;">
      <label>
        Show commits until:
        <input type="range" id="commit-progress" min="0" max="100" value="100" />
        <time id="commit-time"></time>
      </label>
    </div>

    <div id="stats"></div>

    <h2>Commits by time of day</h2>

    <div id="scrolly-1">
      <div id="scatter-story"></div>
      <div id="scatter-plot">
        <div id="chart"></div>

        <dl id="commit-tooltip" class="info tooltip" hidden>
          <dt>Commit</dt>
          <dd><a href="" id="commit-link" target="_blank"></a></dd>
          <dt>Date</dt>
          <dd id="commit-date"></dd>
          <dt>Time</dt>
          <dd id="commit-time"></dd>
          <dt>Author</dt>
          <dd id="commit-author"></dd>
          <dt>Lines Edited</dt>
          <dd id="commit-lines"></dd>
        </dl>

        <p id="selection-count">No commits selected</p>

        <dl id="language-breakdown" class="stats"></dl>
      </div>
    </div>

    <div id="scrolly-2">
      <div id="files-plot">
        <dl id="files"></dl>
      </div>
      <div id="files-story"></div>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
